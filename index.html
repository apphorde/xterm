<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xterm</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link rel="component" href="/terminal.html" />
    <script type="importmap">
      {
        "imports": {
          "@li3/": "https://at-li3.static.apphor.de/",
          "@sodium/": "https://at-sodium.static.apphor.de/",
          "@lucide/": "https://at-lucide.static.apphor.de/"
        }
      }
    </script>
    <script type="module">
      import "@li3/web";
    </script>
  </head>
  <body>
    <template app>
      <div
        class="w-screen h-screen bg-gray-700 text-white p-4 flex flex-col items-center justify-between overflow-auto"
        on-dblclick="onAdd()"
      >
        <template for="next of sessions">
          <x-terminal bind-remote="next"></x-terminal>
        </template>
      </div>
      <script setup>
        import { watch, ref } from "@li3/web";

        export default function () {
          const sessions = ref(
            JSON.parse(localStorage.getItem("sessions") || "[]"),
          );

          function onAdd() {
            const href = prompt("Remote session address (wss://.../)", "");
            if (href) {
              sessions.value.push(href.value);
            }
          }

          watch(
            sessions,
            localStorage.setItem("sessions", JSON.stringify(sessions.value)),
          );

          return { oAdd, sessions, href };
        }
      </script>
    </template>
  </body>
</html>
